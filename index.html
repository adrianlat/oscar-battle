<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oscar Battle · Jerry vs Gerardo</title>
  <style>
    :root{--bg:#0c0f14;--panel:#171d29;--line:#2c3550;--txt:#f6f8fc;--muted:#99a8c5;--gold:#f6c453;--j:#5ab0ff;--g:#f28cc8;--ok:#2dd4a5}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#1c2233,var(--bg) 55%);color:var(--txt);font-family:Inter,system-ui,-apple-system}
    .wrap{max-width:1300px;margin:0 auto;padding:14px}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:12px}
    .panel{background:linear-gradient(180deg,#1a2030,#171d29);border:1px solid var(--line);border-radius:14px;padding:12px}
    .score{position:sticky;top:10px;height:fit-content}
    .score h2{margin:0 0 8px;font-size:1.05rem}
    .who{display:grid;grid-template-columns:1fr auto;gap:6px;padding:9px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
    .who .name{font-weight:800}.pts{font-size:1.6rem;font-weight:900;color:var(--gold)}
    .sub{color:var(--muted);font-size:.88rem}
    .pill{padding:2px 8px;border-radius:999px;font-size:.74rem;border:1px solid transparent}
    .pj{background:rgba(90,176,255,.15);border-color:rgba(90,176,255,.45)} .pg{background:rgba(242,140,200,.14);border-color:rgba(242,140,200,.4)}

    .head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
    .head h1{margin:0;font-size:1.15rem}
    button{background:#293552;color:#fff;border:1px solid #415381;border-radius:9px;padding:7px 10px;cursor:pointer}
    .cats{display:grid;gap:10px}
    .cat{border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(255,255,255,.02)}
    .catTop{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
    .cat h3{margin:0;font-size:1rem}
    .current{font-size:.8rem;color:var(--muted)}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
    .card{border:1px solid #33415f;border-radius:12px;overflow:hidden;background:#101624;display:flex;flex-direction:column}
    .card img{width:100%;height:180px;object-fit:cover;background:#24304b}
    .title{padding:7px 7px 4px;font-size:.8rem;line-height:1.25;min-height:45px}
    .actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:6px}
    .a{font-size:.74rem;padding:6px 4px;border-radius:8px;border:1px solid #3a496f;background:#1f2a42;text-align:center}
    .a.j.on{background:rgba(90,176,255,.2);border-color:var(--j)}
    .a.g.on{background:rgba(242,140,200,.2);border-color:var(--g)}
    .a.w.on{background:rgba(45,212,165,.2);border-color:var(--ok)}
    .noneWrap{margin-top:8px;display:flex;justify-content:flex-end}
    .none{font-size:.78rem}
    .none.on{background:#46321a;border-color:#7d5d2b;color:#ffd990}

    @media (max-width:960px){.layout{grid-template-columns:1fr}.score{position:static}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="layout">
    <aside class="panel score">
      <h2>📊 Score Total</h2>
      <div class="who"><div><div class="name">Jerry</div><div class="sub">Aciertos</div></div><div class="pts" id="sJ">0</div></div>
      <div class="who"><div><div class="name">Gerardo</div><div class="sub">Aciertos</div></div><div class="pts" id="sG">0</div></div>
      <div class="who"><div><div class="name">Avance</div><div class="sub">Categorías resueltas</div></div><div class="pts" id="sR">0</div></div>
      <div class="sub" id="lead">Empate</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <button id="save">Guardar</button><button id="load">Cargar</button><button id="reset">Reset</button>
      </div>
    </aside>

    <main class="panel">
      <div class="head">
        <h1>🏆 Oscar Battle · 98th Academy Awards (2026)</h1>
        <div class="sub">Tap en tarjetas: <span class="pill pj">Jerry</span> <span class="pill pg">Gerardo</span> <span class="pill" style="border-color:#39c69c;background:rgba(45,212,165,.15)">Ganó</span></div>
      </div>
      <div class="cats" id="cats"></div>
    </main>
  </div>
</div>

<script>
const KEY='oscar-battle-touch-v1';
const FALL='https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500&q=80&auto=format&fit=crop';
const state={categories:[
{title:'Mejor Película',nominees:["Una batalla tras otra","Bugonia","Frankenstein","Hamnet","Marty Supreme","El agente secreto","Valor sentimental","Los pecadores","Sueños de trenes","F1: La película"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Dirección',nominees:["Paul Thomas Anderson — Una batalla tras otra","Chloé Zhao — Hamnet","Josh Safdie — Marty Supreme","Ryan Coogler — Los pecadores","Joachim Trier — Valor sentimental"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Actriz',nominees:["Jessie Buckley — Hamnet","Emma Stone — Bugonia","Kate Hudson — Song Sung Blue","Renate Reinsve — Valor sentimental","Rose Byrne — Si pudiera, te daría una patada"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Actor',nominees:["Leonardo DiCaprio — Una batalla tras otra","Timothée Chalamet — Marty Supreme","Michael B. Jordan — Los pecadores","Ethan Hawke — Blue Moon","Wagner Moura — El agente secreto"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Actriz de Reparto',nominees:["Teyana Taylor — Una batalla tras otra","Amy Madigan — Weapons","Elle Fanning — Valor sentimental","Inga Ibsdotter Lilleaas — Valor sentimental","Wunmi Mosaku — Los pecadores"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Actor de Reparto',nominees:["Sean Penn — Una batalla tras otra","Benicio Del Toro — Una batalla tras otra","Jacob Elordi — Frankenstein","Stellan Skarsgård — Valor sentimental","Delroy Lindo — Los pecadores"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Casting',nominees:["Una batalla tras otra","Hamnet","Marty Supreme","Los pecadores","El agente secreto"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Guion Original',nominees:["Los pecadores","Marty Supreme","Valor sentimental","Un simple accidente","Blue Moon"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Guion Adaptado',nominees:["Una batalla tras otra","Hamnet","Frankenstein","Bugonia","Sueños de trenes"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Película Internacional',nominees:["Valor sentimental (Noruega)","El agente secreto (Brasil)","Un simple accidente (Francia)","Sirāt (España)","La voz de Hind (Túnez)"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Película Documental',nominees:["Mr. Nobody contra Putin","Cutting Through Rocks","La vecina perfecta","The Alabama Solution","Come See Me In The Good Light"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Película de Animación',nominees:["Arco","Las guerreras k-pop","Zootrópolis 2","Little Amélie","Elio"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Montaje',nominees:["F1: La película","Una batalla tras otra","Marty Supreme","Los pecadores","Valor sentimental"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Fotografía',nominees:["Los pecadores","Una batalla tras otra","Marty Supreme","Frankenstein","Sueños de trenes"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Diseño de Producción',nominees:["Frankenstein","Los pecadores","Hamnet","Marty Supreme","Una batalla tras otra"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Vestuario',nominees:["Avatar: Fuego y ceniza","Frankenstein","Los pecadores","Hamnet","Marty Supreme"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Maquillaje y Peluquería',nominees:["Frankenstein","Los pecadores","The Smashing Machine","Kokuho","La hermanastra fea"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Música Original',nominees:["Bugonia","Los pecadores","Una batalla tras otra","Frankenstein","Hamnet"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Sonido',nominees:["F1: La película","Los pecadores","Una batalla tras otra","Frankenstein","Sirāt"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Canción Original',nominees:["Golden — Las guerreras k-pop","I Lied to You — Los pecadores","Train Dreams — Sueños de trenes","Dear Me — Diane Warren: Relentless","Sweet Dreams of Joy — Viva Verdi"],leftPick:'',rightPick:'',winner:''},
{title:'Mejores Efectos Visuales',nominees:["Avatar: Fuego y ceniza","Los pecadores","F1: La película","Jurassic World: El renacer","Laberinto en llamas"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Cortometraje de Ficción',nominees:["Butcher's Stain","A Friend of Dorothy","Jane Austen's Period Drama","The Singers","Dos personas intercambiando saliva"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Cortometraje de Animación',nominees:["Butterfly","Forevergreen","The Girl Who Cried Pearls","Retirement Plan","The Three Sisters"],leftPick:'',rightPick:'',winner:''},
{title:'Mejor Cortometraje Documental',nominees:["Todas las habitaciones vacías","Armed Only with a Camera: The Life and Death of Brent Renaud","Children No More: Were and Are Gone","The Devil Is Busy","Perfectly a Strangeness"],leftPick:'',rightPick:'',winner:''}
]};
const cache={};
const $=id=>document.getElementById(id);

// Orden sugerido de transmisión (Best Picture al final)
const ORDER = [
  'Mejor Actor de Reparto',
  'Mejor Actriz de Reparto',
  'Mejor Cortometraje de Animación',
  'Mejor Cortometraje Documental',
  'Mejor Cortometraje de Ficción',
  'Mejor Película de Animación',
  'Mejor Película Internacional',
  'Mejor Película Documental',
  'Mejor Sonido',
  'Mejores Efectos Visuales',
  'Mejor Maquillaje y Peluquería',
  'Mejor Vestuario',
  'Mejor Diseño de Producción',
  'Mejor Fotografía',
  'Mejor Montaje',
  'Mejor Música Original',
  'Mejor Canción Original',
  'Mejor Guion Adaptado',
  'Mejor Guion Original',
  'Mejor Casting',
  'Mejor Actor',
  'Mejor Actriz',
  'Mejor Dirección',
  'Mejor Película'
];
state.categories.sort((a,b)=>{
  const ia = ORDER.indexOf(a.title);
  const ib = ORDER.indexOf(b.title);
  return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
});

const TITLE_ALIASES = {
  'Una batalla tras otra': 'One Battle After Another',
  'El agente secreto': 'The Secret Agent',
  'Valor sentimental': 'Sentimental Value',
  'Los pecadores': 'Sinners',
  'Sueños de trenes': 'Train Dreams',
  'F1: La película': 'F1 (film)',
  'Si pudiera, te daría una patada': "If I Had Legs I'd Kick You",
  'Las guerreras k-pop': 'KPop Demon Hunters',
  'Zootrópolis 2': 'Zootopia 2',
  'La hermanastra fea': 'The Ugly Stepsister',
  'Sirāt': 'Sirat (film)'
};

function filmTitle(label){
  let t = label.includes('—') ? label.split('—')[1].trim() : label.trim();
  t = t.replace(/\s*\([^)]*\)\s*$/,''); // quita (Noruega), etc.
  return TITLE_ALIASES[t] || t;
}

async function thumb(title){
  if(cache[title]) return cache[title];
  const urls = [
    `https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`,
    `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`
  ];
  for (const u of urls) {
    try {
      const r = await fetch(u);
      if (!r.ok) continue;
      const j = await r.json();
      const src = j?.thumbnail?.source;
      if (src) { cache[title] = src; return src; }
    } catch {}
  }
  cache[title] = FALL;
  return FALL;
}

function render(){
  $('cats').innerHTML=state.categories.map((c,i)=>`<section class='cat'>
    <div class='catTop'><h3>${esc(c.title)}</h3><div class='current'>J: ${esc(c.leftPick||'—')} · G: ${esc(c.rightPick||'—')} · Ganó: ${esc(c.winner||'—')}</div></div>
    <div class='grid'>${c.nominees.map((n,j)=>`<article class='card'>
      <img id='img-${i}-${j}' src='${FALL}'><div class='title'>${esc(n)}</div>
      <div class='actions'>
        <button class='a j ${c.leftPick===n?'on':''}' data-a='j' data-i='${i}' data-v='${escA(n)}'>Jerry</button>
        <button class='a g ${c.rightPick===n?'on':''}' data-a='g' data-i='${i}' data-v='${escA(n)}'>Gerardo</button>
        <button class='a w ${c.winner===n?'on':''}' data-a='w' data-i='${i}' data-v='${escA(n)}'>Ganó</button>
      </div></article>`).join('')}</div>
    <div class='noneWrap'><button class='none ${c.winner==='NINGUNO'?'on':''}' data-a='none' data-i='${i}'>Nadie ganó</button></div>
  </section>`).join('');

  document.querySelectorAll('[data-a]').forEach(b=>b.onclick=e=>{
    const i=+e.currentTarget.dataset.i,a=e.currentTarget.dataset.a,v=e.currentTarget.dataset.v||'';
    if(a==='j') state.categories[i].leftPick=v;
    if(a==='g') state.categories[i].rightPick=v;
    if(a==='w') state.categories[i].winner=v;
    if(a==='none') state.categories[i].winner='NINGUNO';
    render();
  });

  score(); loadImgs();
}

async function loadImgs(){for(let i=0;i<state.categories.length;i++){for(let j=0;j<state.categories[i].nominees.length;j++){const el=$(`img-${i}-${j}`); if(!el)continue; el.src=await thumb(filmTitle(state.categories[i].nominees[j]));}}}
function score(){let j=0,g=0,r=0;state.categories.forEach(c=>{if(!c.winner)return;r++;if(c.winner!=='NINGUNO'){if(c.leftPick===c.winner)j++;if(c.rightPick===c.winner)g++;}});$('sJ').textContent=j;$('sG').textContent=g;$('sR').textContent=`${r}/${state.categories.length}`;$('lead').textContent=j===g?'Empate':(j>g?'Va ganando Jerry':'Va ganando Gerardo')}
function esc(s=''){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function escA(s=''){return s.replace(/"/g,'&quot;')}
$('save').onclick=()=>{localStorage.setItem(KEY,JSON.stringify(state));alert('Guardado ✅')}
function sortCategories(){
  state.categories.sort((a,b)=>{
    const ia = ORDER.indexOf(a.title);
    const ib = ORDER.indexOf(b.title);
    return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
  });
}
$('load').onclick=()=>{const raw=localStorage.getItem(KEY);if(!raw)return alert('No hay guardado');const d=JSON.parse(raw);state.categories=d.categories||state.categories;sortCategories();render()}
$('reset').onclick=()=>{if(confirm('¿Reset total?')){localStorage.removeItem(KEY);location.reload()}}
sortCategories();
render();
</script>
</body>
</html>
